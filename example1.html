<!DOCTYPE html>
<html>
<head>
  <meta> charset="UTF-8"></meta>
  <title>Test Page</title>


  <!-- ここでCSSを読み込む -->
  <link rel="stylesheet" href="style.css">
</head>

<p Id="result"></p>
  
<body>
  <h1>こんにちは！</h1>
  <p>これは練習ページです</p>
    
<input type="text" id="searchBox" placeholder="検索...">
<button onclick="search()">検索</button>

<p Id="result"></p>
  
<script>
    function search() {
      let keyword = document.getElementById("searchBox").balue;
      let content = document.body.innerText;

      if (content.includes(keyword)){
        document.getElementById("result").innerText = "見つかりました！";
      } else {
        document.getElementById("result").innerText = "見つかりませんでした";
      }
    }
</script>
          
    
</body>
</html>
